<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>The Time I Woke Up Inside a Museum and Now My Boss Is Making Me Fetch Artifacts</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #111;
      color: #eee;
      font-family: system-ui, sans-serif;
      height: 100%;
      overflow: hidden;
    }

    #game-root {
      display: flex;
      height: 100vh;
      width: 100vw;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top, #333 0, #111 60%);
    }

    #game-container {
      position: relative;
      width: 800px;
      height: 600px;
      background: #000;
      border: 2px solid #555;
      box-shadow: 0 0 20px #000;
      overflow: hidden;
    }

    #game-canvas {
      background: #1b1b1b;
      image-rendering: pixelated;
      width: 100%;
      height: 100%;
      display: block;
    }

    /* Dialogue box */
    #ui-dialogue {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 180px;
      background: rgba(0, 0, 0, 0.9);
      border-top: 2px solid #555;
      padding: 10px 16px;
      box-sizing: border-box;
      display: none;
      flex-direction: column;
      gap: 6px;
      transform: translateY(40px);
      opacity: 0;
    }

    /* Slide + fade animation (0.6s) */
    @keyframes dialogueSlideFadeIn {
      from {
        transform: translateY(40px);
        opacity: 0;
      }
      to {
        transform: translateY(0);
        opacity: 1;
      }
    }

    #ui-dialogue.show {
      animation: dialogueSlideFadeIn 0.6s ease-out forwards;
    }

    #ui-name {
      font-weight: bold;
      padding: 2px 8px;
      border-radius: 4px;
      display: inline-block;
      max-width: 60%;
      text-shadow: 0 0 4px #000;
    }

    #ui-text {
      font-size: 15px;
      line-height: 1.4;
      white-space: pre-wrap;
      margin-top: 4px;
    }

    #ui-hint {
      margin-top: auto;
      font-size: 12px;
      color: #aaa;
      text-align: right;
    }

    /* Typing caret */
    .typing {
      border-right: 2px solid #ffd36b;
      animation: caretBlink 0.7s infinite;
    }

    @keyframes caretBlink {
      0% { border-color: transparent; }
      50% { border-color: #ffd36b; }
      100% { border-color: transparent; }
    }

    /* Overlay */
    #ui-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      display: none;
      align-items: center;
      justify-content: center;
      color: #eee;
      font-size: 18px;
      text-align: center;
      padding: 20px;
      box-sizing: border-box;
    }

    #ui-overlay-inner {
      max-width: 520px;
    }

    #ui-overlay-text {
      margin-bottom: 16px;
      white-space: pre-wrap;
    }

    #ui-overlay-btn {
      padding: 6px 14px;
      background: #333;
      color: #eee;
      border: 1px solid #777;
      cursor: pointer;
    }

    #ui-overlay-btn:hover {
      background: #444;
    }

    #debug {
      position: absolute;
      top: 4px;
      left: 6px;
      font-size: 11px;
      color: #888;
      pointer-events: none;
    }
  </style>
</head>
<body>
<div id="game-root">
  <div id="game-container">
    <canvas id="game-canvas" width="800" height="600"></canvas>

    <!-- Dialogue UI -->
    <div id="ui-dialogue">
      <div id="ui-name"></div>
      <div id="ui-text"></div>
      <div id="ui-hint">SPACE: finish / advance</div>
    </div>

    <!-- Overlay -->
    <div id="ui-overlay">
      <div id="ui-overlay-inner">
        <div id="ui-overlay-text"></div>
        <button id="ui-overlay-btn">Start</button>
      </div>
    </div>

    <div id="debug"></div>
  </div>
</div>

<script>
  // ------------------------------------------------------------
  // DOM + CANVAS SETUP
  // ------------------------------------------------------------
  const canvas = document.getElementById("game-canvas");
  const ctx = canvas.getContext("2d");

  const uiDialogue = document.getElementById("ui-dialogue");
  const uiName = document.getElementById("ui-name");
  const uiText = document.getElementById("ui-text");
  const uiHint = document.getElementById("ui-hint");

  const uiOverlay = document.getElementById("ui-overlay");
  const uiOverlayText = document.getElementById("ui-overlay-text");
  const uiOverlayBtn = document.getElementById("ui-overlay-btn");

  const debugEl = document.getElementById("debug");

  // ------------------------------------------------------------
  // CHARACTER STYLES (nameplate colors)
  // ------------------------------------------------------------
  const CharacterStyles = {
    "???": { name: "???", color: "#e6d0bd" },          // Kiro early
    Narrator: { name: "Narrator", color: "#ffffff" },
    Kid: { name: "Kid", color: "#d0d0d0" },
    Father: { name: "Father", color: "#d0d0d0" },
    Doctor: { name: "Doctor", color: "#d0d0d0" },
    Kiro: { name: "Kiro", color: "#e6d0bd" },          // later, if used
    Tie: { name: "Tie", color: "#ff7266" },            // new Tie color
    Dustworth: { name: "Mr. Morgan Dustworth", color: "#98f2e7" } // new Dustworth color
  };

  function applySpeakerStyle(speaker) {
    const style = CharacterStyles[speaker] || null;
    if (!style) {
      uiName.style.backgroundColor = "#444";
      uiName.style.color = "#fff";
      uiName.textContent = speaker || "";
      return;
    }
    uiName.style.backgroundColor = style.color;
    uiName.style.color = "#111";
    uiName.textContent = style.name;
  }

  // ------------------------------------------------------------
  // KIRO SPRITES (adjustable filenames)
  // ------------------------------------------------------------
  const KiroSprites = {
    idle: [
      "Assets/Kiro/kiro_idle_1.png",
      "Assets/Kiro/kiro_idle_2.png"
    ],
    walk: [
      "Assets/Kiro/kiro_walk_1.png",
      "Assets/Kiro/kiro_walk_2.png"
    ]
  };

  const KiroImages = {
    idle: [],
    walk: []
  };

  function loadKiroSprites() {
    for (const frame of KiroSprites.idle) {
      const img = new Image();
      img.src = frame;
      KiroImages.idle.push(img);
    }
    for (const frame of KiroSprites.walk) {
      const img = new Image();
      img.src = frame;
      KiroImages.walk.push(img);
    }
  }
  loadKiroSprites();

  // ------------------------------------------------------------
  // INPUT STATE
  // ------------------------------------------------------------
  const keys = {};
  window.addEventListener("keydown", e => {
    keys[e.key.toLowerCase()] = true;
    if (e.key === " ") e.preventDefault();
  });
  window.addEventListener("keyup", e => {
    keys[e.key.toLowerCase()] = false;
  });

  // ------------------------------------------------------------
  // GLOBAL GAME STATE
  // ------------------------------------------------------------
  const GameState = {
    mode: "overlay",   // 'overlay' | 'vn' | 'map'
    mapId: "room_1",
    player: {
      x: 400,
      y: 360,
      size: 32,
      speed: 1.5,
      animState: "idle",
      animFrame: 0,
      animTimer: 0
    },
    flags: {}
  };

  const Maps = {};
  const Scenes = {};

  // ------------------------------------------------------------
  // MAPS
  // ------------------------------------------------------------
  Maps.room_1 = {
    width: 800,
    height: 600,
    walls: [
      { x: 0, y: 0, w: 800, h: 40 },
      { x: 0, y: 0, w: 40, h: 600 },
      { x: 0, y: 560, w: 800, h: 40 },
      { x: 760, y: 0, w: 40, h: 600 },
      { x: 360, y: 220, w: 80, h: 40 } // sarcophagus
    ],
    npcs: [
      {
        id: "tie",
        speakerKey: "Tie",
        x: 420,
        y: 280,
        w: 24,
        h: 24,
        color: "#ff7266",
        interact: () => {
          startDialogue({
            lines: [
              { speaker: "Tie", text: "There you are. Upright and everything.\nDidn't think you had it in you." },
              { speaker: "Kiro", text: "Pretty sure I don't have most things in me.\nOrgans, for example." },
              { speaker: "Tie", text: "Details.\nListen, mummy boy, you're on payroll now." },
              { speaker: "Kiro", text: "Payroll?? I literally just woke up." },
              { speaker: "Tie", text: "Yeah. Museum needed cheap labor.\nYou're technically \"historical enrichment\"." },
              { speaker: "Tie", text: "Walk around. Try not to fall apart.\nWe'll talk artifacts later." }
            ]
          });
        }
      },
      {
        id: "dustworth",
        speakerKey: "Dustworth",
        x: 200,
        y: 200,
        w: 24,
        h: 24,
        color: "#98f2e7",
        interact: () => {
          startDialogue({
            lines: [
              {
                speaker: "Dustworth",
                text: "Hello! My name is Morgan Dustworth—\n—but please, call me Morgan.\nI'm so delighted you're here."
              },
              {
                speaker: "Dustworth",
                text: "You look like someone with tremendous potential.\nThe kind of potential that keeps the lights on."
              },
              {
                speaker: "Kiro",
                text: "Is that... a compliment or a threat?"
              },
              {
                speaker: "Dustworth",
                text: "Why not both?\nThink of yourself as a very valuable... asset."
              }
            ]
          });
        }
      }
    ]
  };

  // ------------------------------------------------------------
  // INTRO SCENE (your new script)
  // ------------------------------------------------------------
  Scenes.intro = {
    lines: [
      { speaker: "???", text: "(...huh?\nWhy is everything so... bright?)" },
      {
        speaker: "Narrator",
        text: "You wake up inside a glass case.\nYour joints creak. Your bandages itch.\nYou are very, very dead.\nAnd somehow not."
      },
      {
        speaker: "Kid",
        text: "Dad, look! It's a mummy!"
      },
      {
        speaker: "Narrator",
        text: "You look at the kid talking ever so loudly and eagerly.\nThe kid then freezes up, shocked and starts...\n\nCrying?"
      },
      {
        speaker: "Kid",
        text: "WAHHHHHH I-I-I-I-IT MOVED!!"
      },
      {
        speaker: "???",
        text: "*...*"
      },
      {
        speaker: "Narrator",
        text: "The dad steps closer to the kid and drags them off."
      },
      {
        speaker: "Father",
        text: "Shh shh shhh, stop crying… haha… it's okay! See? It's not moving… right Mr. Dustworth?"
      },
      {
        speaker: "Dustworth",
        text: "Oh? Kids these days surely have a bright imagination."
      },
      {
        speaker: "Narrator",
        text: "Mr. Dustworth walks over to look at your case.\nHe looks a bit surprised by you, being an artifact, blinking."
      },
      {
        speaker: "Dustworth",
        text: "It's truly nothing… hehe."
      },
      {
        speaker: "Narrator",
        text: "Mr. Dustworth assures the father as he dials a number on his phone.\nYou close your eyes, a bit too tired yet too energetic."
      },
      {
        speaker: "Doctor",
        text: "Ah I see, you're finally awake"
      },
      {
        speaker: "Tie",
        text: "*scoot scoot*\nUgh, it's been a week and this f*cker still hasn't fed me…"
      },
      {
        speaker: "Narrator",
        text: "An annoyed voice complains.\nIt stops scooting."
      }
    ],
    onComplete: () => {
      GameState.mode = "map";
      hideDialogue();
    }
  };

  // ------------------------------------------------------------
  // DIALOGUE SYSTEM
  // ------------------------------------------------------------
  let activeDialogue = null;
  let typingInterval = null;
  let isTyping = false;

  function showDialogue() {
    uiDialogue.style.display = "flex";
    uiDialogue.classList.add("show");
  }

  function hideDialogue() {
    uiDialogue.classList.remove("show");
    uiDialogue.style.display = "none";
  }

  function startDialogue(scene) {
    activeDialogue = {
      lines: scene.lines,
      index: 0,
      onComplete: scene.onComplete || null
    };
    GameState.mode = "vn";
    showDialogue();
    renderDialogueLine();
  }

  function renderDialogueLine() {
    if (!activeDialogue) return;
    const line = activeDialogue.lines[activeDialogue.index];
    if (!line) return;

    applySpeakerStyle(line.speaker);
    uiText.textContent = "";
    uiText.classList.add("typing");

    clearInterval(typingInterval);
    isTyping = true;

    const full = line.text;
    let i = 0;

    typingInterval = setInterval(() => {
      i++;
      uiText.textContent = full.slice(0, i);
      if (i >= full.length) {
        clearInterval(typingInterval);
        uiText.classList.remove("typing");
        isTyping = false;
      }
    }, 20);
  }

  function finishTypingInstantly() {
    if (!activeDialogue) return;
    const line = activeDialogue.lines[activeDialogue.index];
    if (!line) return;

    clearInterval(typingInterval);
    uiText.textContent = line.text;
    uiText.classList.remove("typing");
    isTyping = false;
  }

  function advanceDialogue() {
    if (!activeDialogue) return;

    activeDialogue.index++;
    if (activeDialogue.index >= activeDialogue.lines.length) {
      const cb = activeDialogue.onComplete;
      activeDialogue = null;
      hideDialogue();
      GameState.mode = "map";
      if (cb) cb();
      return;
    }
    renderDialogueLine();
  }

  // ------------------------------------------------------------
  // COLLISION
  // ------------------------------------------------------------
  function collides(x, y, w, h, walls) {
    for (const wall of walls) {
      if (
        x < wall.x + wall.w &&
        x + w > wall.x &&
        y < wall.y + wall.h &&
        y + h > wall.y
      ) {
        return true;
      }
    }
    return false;
  }

  // ------------------------------------------------------------
  // MOVEMENT (normalized, pixel-snappy)
  // ------------------------------------------------------------
  function movePlayer(dt) {
    const p = GameState.player;
    const map = Maps[GameState.mapId];

    let dx = 0, dy = 0;

    if (keys["w"] || keys["arrowup"]) dy -= 1;
    if (keys["s"] || keys["arrowdown"]) dy += 1;
    if (keys["a"] || keys["arrowleft"]) dx -= 1;
    if (keys["d"] || keys["arrowright"]) dx += 1;

    if (dx === 0 && dy === 0) {
      p.animState = "idle";
      return;
    }

    const len = Math.hypot(dx, dy);
    dx = Math.round((dx / len) * p.speed);
    dy = Math.round((dy / len) * p.speed);

    const newX = p.x + dx;
    if (!collides(newX - p.size / 2, p.y - p.size / 2, p.size, p.size, map.walls)) {
      p.x = newX;
    }

    const newY = p.y + dy;
    if (!collides(p.x - p.size / 2, newY - p.size / 2, p.size, p.size, map.walls)) {
      p.y = newY;
    }

    p.animState = "walk";
  }

  // ------------------------------------------------------------
  // KIRO ANIMATION
  // ------------------------------------------------------------
  function updateKiroAnimation(dt) {
    const p = GameState.player;

    const idleSpeed = 0.6;
    const walkSpeed = 0.15;

    p.animTimer += dt;

    if (p.animState === "idle") {
      if (p.animTimer >= idleSpeed) {
        p.animTimer = 0;
        p.animFrame = (p.animFrame + 1) % KiroImages.idle.length;
      }
    }

    if (p.animState === "walk") {
      if (p.animTimer >= walkSpeed) {
        p.animTimer = 0;
        p.animFrame = (p.animFrame + 1) % KiroImages.walk.length;
      }
    }
  }

  function drawKiro() {
    const p = GameState.player;

    let img;
    if (p.animState === "idle") {
      img = KiroImages.idle[p.animFrame] || KiroImages.idle[0];
    } else {
      img = KiroImages.walk[p.animFrame] || KiroImages.walk[0];
    }

    if (img && img.complete) {
      ctx.imageSmoothingEnabled = false;
      ctx.drawImage(
        img,
        p.x - p.size / 2,
        p.y - p.size / 2,
        p.size,
        p.size
      );
    } else {
      ctx.fillStyle = "#d9c27a";
      ctx.fillRect(
        p.x - p.size / 2,
        p.y - p.size / 2,
        p.size,
        p.size
      );
    }
  }

  // ------------------------------------------------------------
  // INTERACTION
  // ------------------------------------------------------------
  function tryInteract() {
    const map = Maps[GameState.mapId];
    const p = GameState.player;

    for (const npc of map.npcs) {
      const dist = Math.hypot(p.x - npc.x, p.y - npc.y);
      if (dist < 40) {
        npc.interact();
        return;
      }
    }
  }

  // ------------------------------------------------------------
  // RENDERING
  // ------------------------------------------------------------
  function renderMap() {
    const map = Maps[GameState.mapId];

    ctx.fillStyle = "#202020";
    ctx.fillRect(0, 0, map.width, map.height);

    ctx.fillStyle = "#252525";
    for (let y = 40; y < map.height - 40; y += 40) {
      for (let x = 40; x < map.width - 40; x += 40) {
        ctx.fillRect(x, y, 38, 38);
      }
    }

    ctx.fillStyle = "#444";
    for (const wall of map.walls) {
      ctx.fillRect(wall.x, wall.y, wall.w, wall.h);
    }

    ctx.fillStyle = "#7b5b2b";
    ctx.fillRect(360, 220, 80, 40);
    ctx.strokeStyle = "#cfa96a";
    ctx.strokeRect(360, 220, 80, 40);

    for (const npc of map.npcs) {
      ctx.fillStyle = npc.color;
      ctx.fillRect(
        npc.x - npc.w / 2,
        npc.y - npc.h / 2,
        npc.w,
        npc.h
      );
    }

    drawKiro();
  }

  function render() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (GameState.mode === "map") {
      renderMap();
    } else {
      ctx.fillStyle = "#111";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    debugEl.textContent = `mode: ${GameState.mode}`;
  }

  // ------------------------------------------------------------
  // MAIN LOOP
  // ------------------------------------------------------------
  let last = performance.now();
  function loop(now) {
    const dt = (now - last) / 1000;
    last = now;

    if (GameState.mode === "map") {
      movePlayer(dt);
      updateKiroAnimation(dt);
    }

    render();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  // ------------------------------------------------------------
  // INPUT HANDLING
  // ------------------------------------------------------------
  window.addEventListener("keydown", e => {
    if (e.key === " " || e.key === "Enter") {
      if (GameState.mode === "vn") {
        if (isTyping) {
          finishTypingInstantly();
        } else {
          advanceDialogue();
        }
      }
    }
    if (e.key.toLowerCase() === "e") {
      if (GameState.mode === "map") {
        tryInteract();
      }
    }
  });

  // ------------------------------------------------------------
  // OVERLAY
  // ------------------------------------------------------------
  function showOverlay(text) {
    uiOverlayText.textContent = text;
    uiOverlay.style.display = "flex";
  }

  function hideOverlay() {
    uiOverlay.style.display = "none";
  }

  uiOverlayBtn.onclick = () => {
    hideOverlay();
    GameState.mode = "vn";
    startDialogue(Scenes.intro);
  };

  // ------------------------------------------------------------
  // INIT
  // ------------------------------------------------------------
  showOverlay(
    "The Time I Woke Up Inside a Museum and Now My Boss Is Making Me Fetch Artifacts\n\nWASD / Arrows: Move\nE: Interact\nSPACE: Finish / Advance Dialogue"
  );
</script>
</body>
</html>
