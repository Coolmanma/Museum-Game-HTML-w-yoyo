// ===================== TILE IMAGES =====================
const TileImages = {};

function loadTileImages() {
  const promises = [];
  for (const key in TileTypes) {
    const path = TileTypes[key].image;
    const img = new Image();
    TileImages[key] = img;
    const p = new Promise(resolve => {
      img.onload = resolve;
      img.onerror = resolve;
    });
    img.src = path;
    promises.push(p);
  }
  return Promise.all(promises);
}

// ===================== MAP HELPERS =====================
function hasWallAt(map, x, y) {
  if (x < 0 || y < 0 || x >= map.cols || y >= map.rows) return false;
  const symbol = map.tiles[y][x];
  const def = TileTypes[symbol];
  return def && def.isWall;
}

function isCollidableAt(worldX, worldY) {
  const map = GameState.map;
  const ts = map.tileSize;
  const tx = Math.floor(worldX / ts);
  const ty = Math.floor(worldY / ts);
  if (tx < 0 || ty < 0 || tx >= map.cols || ty >= map.rows) return true;
  const symbol = map.tiles[ty][tx];
  const def = TileTypes[symbol];
  return def && def.canCollide;
}

// ===================== ANIMATION =====================
function updateCharacterAnimation(char, dt) {
  const frames = char.sprites.idle[char.dir];
  if (!frames || frames.length === 0) return;

  char.animTimer += dt;
  if (char.animTimer >= char.animSpeed) {
    char.animTimer = 0;
    char.animFrame = (char.animFrame + 1) % frames.length;
  }
}

function updatePlayerAnimation(p, dt) {
  const frames = p.sprites[p.animState][p.dir];
  if (!frames || frames.length === 0) return;

  // Slow idle, normal walk
  p.animSpeed = (p.animState === "idle") ? 0.45 : 0.12;

  p.animTimer += dt;
  if (p.animTimer >= p.animSpeed) {
    p.animTimer = 0;
    p.animFrame = (p.animFrame + 1) % frames.length;
  }
}

// ===================== MOVEMENT =====================
function updatePlayer(dt) {
  if (GameState.dialogueActive) return;

  const p = GameState.player;
  const speed = p.speed;
  let vx = 0, vy = 0;

  if (GameState.keys["w"] || GameState.keys["arrowup"]) {
    vy -= 1;
    p.dir = "up";
  }
  if (GameState.keys["s"] || GameState.keys["arrowdown"]) {
    vy += 1;
    p.dir = "down";
  }
  if (GameState.keys["a"] || GameState.keys["arrowleft"]) {
    vx -= 1;
    p.dir = "left";
  }
  if (GameState.keys["d"] || GameState.keys["arrowright"]) {
    vx += 1;
    p.dir = "right";
  }

  if (vx !== 0 || vy !== 0) {
    const len = Math.hypot(vx, vy) || 1;
    vx /= len;
    vy /= len;
    p.animState = "walk";
  } else {
    p.animState = "idle";
    p.animFrame = 0;
  }

  const moveX = vx * speed * dt;
  const moveY = vy * speed * dt;

  const newX = p.x + moveX;
  const newY = p.y + moveY;

  const feetY = newY + 16;

  if (!isCollidableAt(newX, feetY)) p.x = newX;
  if (!isCollidableAt(p.x, feetY)) p.y = newY;

  GameState.camera.x = p.x - canvas.width / 2;
  GameState.camera.y = p.y - canvas.height / 2;
}
// ===================== RENDER MAP =====================
function renderMap() {
  const map = GameState.map;
  if (!map) return;

  const ts = map.tileSize;
  const cam = GameState.camera;

  for (let y = 0; y < map.rows; y++) {
    for (let x = 0; x < map.cols; x++) {

      const symbol = map.tiles[y][x];
      const def = TileTypes[symbol] || TileTypes["f"];

      const worldX = x * ts;
      const worldY = y * ts;

      const sx = worldX - cam.x;
      const sy = worldY - cam.y;

      // Shadows for walls
      if (def.castShadow) {
        const leftWall  = hasWallAt(map, x - 1, y);
        const rightWall = hasWallAt(map, x + 1, y);

        let shadowWidth = ts * 0.9;
        let shadowX = sx + ts * 0.05;

        if (leftWall && rightWall) {
          shadowWidth = ts * 2.0;
          shadowX = sx - ts * 0.5;
        } else if (leftWall) {
          shadowWidth = ts * 1.4;
          shadowX = sx - ts * 0.4;
        } else if (rightWall) {
          shadowWidth = ts * 1.4;
          shadowX = sx;
        }

        ctx.fillStyle = `rgba(0,0,0,${def.shadowOpacity || 0.3})`;
        ctx.beginPath();
        ctx.ellipse(
          shadowX + shadowWidth / 2,
          sy + ts - 5 + (def.shadowOffsetY || 0),
          shadowWidth / 2,
          ts * 0.18,
          0,
          0,
          Math.PI * 2
        );
        ctx.fill();
      }

      // Draw tile
      if (def.isWall) {
        // bottom
        if (wallBottomImg.complete && wallBottomImg.naturalWidth > 0) {
          ctx.drawImage(wallBottomImg, sx, sy, ts, ts);
        } else {
          ctx.fillStyle = "#555";
          ctx.fillRect(sx, sy, ts, ts);
        }

        // top stacked above
        if (wallTopImg.complete && wallTopImg.naturalWidth > 0) {
          ctx.drawImage(wallTopImg, sx, sy - ts, ts, ts);
        }

      } else {
        const img = TileImages[symbol];
        if (img && img.complete && img.naturalWidth > 0) {
          ctx.drawImage(img, sx, sy, ts, ts);
        } else {
          ctx.fillStyle = "#222";
          ctx.fillRect(sx, sy, ts, ts);
        }
      }
    }
  }
}

// ===================== DRAW NPCs (32x32 idle only) =====================
function drawNPCs() {
  const cam = GameState.camera;

  for (const npc of GameState.npcs) {
    updateCharacterAnimation(npc, GameState.dt);

    const frames = npc.sprites.idle[npc.dir];
    const img = frames[npc.animFrame];
    if (!img || !img.complete || img.naturalWidth === 0) continue;

    // NPC is 32x32, feet at tile center
    const drawX = Math.round(npc.x - npc.width / 2 - cam.x);
    const drawY = Math.round(npc.y - npc.height + 16 - cam.y);

    ctx.drawImage(img, drawX, drawY, npc.width, npc.height);
  }
}


// ===================== DRAW PLAYER (32x64 feet aligned) =====================
function drawPlayer() {
  const p = GameState.player;
  const frames = p.sprites[p.animState][p.dir];
  const img = frames[p.animFrame];
  if (!img || !img.complete || img.naturalWidth === 0) return;

  const halfTile = 16;
  const screenX = Math.round(canvas.width / 2);
  const screenY = Math.round(canvas.height / 2);

  const drawX = screenX - halfTile;
  const drawY = screenY - p.height + halfTile;

  ctx.drawImage(img, drawX, drawY, p.width, p.height);
}

// ===================== CIRCULAR MINIMAP =====================
function renderMinimap() {
  const map = GameState.map;
  if (!map) return;

  const mmSize = 180;
  const radius = mmSize / 2;
  const mmX = canvas.width - mmSize - 20;
  const mmY = 20;

  const zoom = 0.15;
  const scale = zoom;

  const centerX = mmX + radius;
  const centerY = mmY + radius;

  ctx.save();
  ctx.beginPath();
  ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
  ctx.clip();

  ctx.fillStyle = "rgba(0,0,0,0.8)";
  ctx.fillRect(mmX, mmY, mmSize, mmSize);

  for (let y = 0; y < map.rows; y++) {
    for (let x = 0; x < map.cols; x++) {
      const symbol = map.tiles[y][x];
      const def = TileTypes[symbol] || TileTypes["f"];

      const worldX = x * map.tileSize;
      const worldY = y * map.tileSize;

      const dx = (worldX - GameState.player.x) * scale;
      const dy = (worldY - GameState.player.y) * scale;

      const sx = centerX + dx;
      const sy = centerY + dy;

      const tileSizeScaled = map.tileSize * scale;

      if (Math.hypot(sx - centerX, sy - centerY) > radius + tileSizeScaled) continue;

      ctx.fillStyle = def.minimapColor || "#555555";
      ctx.fillRect(sx, sy, tileSizeScaled, tileSizeScaled);
    }
  }

  // Player dot
  ctx.fillStyle = "#00ffea";
  ctx.beginPath();
  ctx.arc(centerX, centerY, 5, 0, Math.PI * 2);
  ctx.fill();

  // NPC dots
  for (const npc of GameState.npcs) {
    const dx = (npc.x - GameState.player.x) * scale;
    const dy = (npc.y - GameState.player.y) * scale;
    const sx = centerX + dx;
    const sy = centerY + dy;

    if (Math.hypot(sx - centerX, sy - centerY) > radius - 4) continue;

    ctx.fillStyle = "#ff4444";
    ctx.beginPath();
    ctx.arc(sx, sy, 4, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore();

  ctx.strokeStyle = "#ffffff";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(centerX, centerY, radius, 0, Math.PI * 2);
  ctx.stroke();
}

// ===================== DIALOGUE ADVANCE =====================
function advanceDialogue() {
  GameState.dialogueIndex++;
  GameState.dialogueTimer = 0;
  GameState.canAdvanceDialogue = false;

  if (GameState.dialogueIndex >= dialogueScript.length) {
    GameState.dialogueActive = false;
  }
}

function updateDialogue(dt) {
  if (!GameState.dialogueActive) return;
  GameState.dialogueTimer += dt;
  if (GameState.dialogueTimer >= GameState.dialogueDelay) {
    GameState.canAdvanceDialogue = true;
  }
}

// ===================== RENDER DIALOGUE BOX =====================
function renderDialogue() {
  if (!GameState.dialogueActive) return;

  const entry = dialogueScript[GameState.dialogueIndex];
  if (!entry) return;

  const margin = 40;
  const boxHeight = canvas.height * 0.28;
  const boxY = canvas.height - boxHeight - 20;

  ctx.fillStyle = "rgba(0,0,0,0.8)";
  ctx.fillRect(margin, boxY, canvas.width - margin * 2, boxHeight);

  ctx.strokeStyle = "#ffffff";
  ctx.lineWidth = 2;
  ctx.strokeRect(margin, boxY, canvas.width - margin * 2, boxHeight);

  ctx.fillStyle = entry.color;
  ctx.font = "20px sans-serif";
  ctx.textBaseline = "top";

  ctx.fillText(entry.speaker, margin + 16, boxY + 12);

  ctx.fillStyle = "#ffffff";
  ctx.font = "18px sans-serif";

  const lines = entry.text.split("\n");
  let y = boxY + 40;
  const lineHeight = 22;

  for (const line of lines) {
    ctx.fillText(line, margin + 16, y);
    y += lineHeight;
  }

  if (GameState.canAdvanceDialogue) {
    ctx.font = "14px sans-serif";
    ctx.fillStyle = "#cccccc";
    ctx.fillText("[Press SPACE or ENTER]", canvas.width - margin - 180, boxY + boxHeight - 26);
  }
}
// ===================== FIND SPAWN + NPCS =====================
function findSpawnAndNPCs(kiroSprites, npcSprites) {
  const map = GameState.map;
  const ts = map.tileSize;

  for (let y = 0; y < map.rows; y++) {
    for (let x = 0; x < map.cols; x++) {

      const symbol = map.tiles[y][x];

      // Player spawn
      if (symbol === "p") {
        GameState.player = createPlayer(
          x * ts + ts / 2,
          y * ts + ts / 2,
          kiroSprites
        );
      }

      // NPC spawn
      if (symbol === "n") {
        const npc = createNPC(
          x * ts + ts / 2,
          y * ts + ts / 2,
          npcSprites
        );
        GameState.npcs.push(npc);
      }
    }
  }

  // Fallback if no spawn tile
  if (!GameState.player) {
    GameState.player = createPlayer(ts * 2, ts * 2, kiroSprites);
  }

  GameState.camera.x = GameState.player.x - canvas.width / 2;
  GameState.camera.y = GameState.player.y - canvas.height / 2;
}

// ===================== NPC INTERACTION (E KEY) =====================
function checkNPCInteraction() {
  if (GameState.dialogueActive) return; // can't interact during intro

  if (!GameState.keys["e"]) return;

  const p = GameState.player;

  for (const npc of GameState.npcs) {
    const dx = npc.x - p.x;
    const dy = npc.y - p.y;
    const dist = Math.hypot(dx, dy);

    if (dist < 40) {
      // Start a simple NPC dialogue
      GameState.dialogueActive = true;
      GameState.dialogueIndex = 0;
      dialogueScript.length = 0; // clear intro
      dialogueScript.push(
        { speaker: "NPC", color: "#d0d0d0", text: "Oh! Hello there." },
        { speaker: "NPC", color: "#d0d0d0", text: "I'm just a placeholder for now." },
        { speaker: "NPC", color: "#d0d0d0", text: "More characters will be added later." }
      );
      return;
    }
  }
}

// ===================== MAIN LOOP =====================
function loop(timestamp) {
  const last = GameState.lastTime || timestamp;
  const dt = (timestamp - last) / 1000;
  GameState.lastTime = timestamp;
  GameState.dt = dt;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  updateDialogue(dt);
  updatePlayer(dt);
  updatePlayerAnimation(GameState.player, dt);
  checkNPCInteraction();

  renderMap();
  drawNPCs();
  drawPlayer();
  renderMinimap();
  renderDialogue();

  requestAnimationFrame(loop);
}

// ===================== START GAME =====================
async function startGame() {
  await loadTileImages();
  const kiroSprites = await loadKiroSprites();
  const npcSprites = await loadNPCSprites();
  findSpawnAndNPCs(kiroSprites, npcSprites);
  requestAnimationFrame(loop);
}

startGame();
</script>
