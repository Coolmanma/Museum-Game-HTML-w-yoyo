<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Museum Game</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #111;
    color: #eee;
    font-family: system-ui, sans-serif;
    height: 100%;
    overflow: hidden;
  }

  #game-root {
    display: flex;
    height: 100vh;
    width: 100vw;
    align-items: center;
    justify-content: center;
    background: radial-gradient(circle at top, #333 0, #111 60%);
  }

  #game-container {
    position: relative;
    width: 800px;
    height: 600px;
    background: #000;
    border: 2px solid #555;
    box-shadow: 0 0 20px #000;
    overflow: hidden;
  }

  #game-canvas {
    background: #1b1b1b;
    image-rendering: pixelated;
    width: 100%;
    height: 100%;
    display: block;
  }

  #ui-dialogue {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    height: 180px;
    background: rgba(0, 0, 0, 0.9);
    border-top: 2px solid #555;
    padding: 10px 16px;
    box-sizing: border-box;
    display: none;
    flex-direction: column;
    gap: 6px;
    transform: translateY(40px);
    opacity: 0;
  }

  @keyframes dialogueSlideFadeIn {
    from { transform: translateY(40px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }

  #ui-dialogue.show {
    animation: dialogueSlideFadeIn 0.6s ease-out forwards;
  }

  #ui-name {
    font-weight: bold;
    padding: 2px 8px;
    border-radius: 4px;
    display: inline-block;
    max-width: 60%;
    text-shadow: 0 0 4px #000;
  }

  #ui-text {
    font-size: 15px;
    line-height: 1.4;
    white-space: pre-wrap;
    margin-top: 4px;
  }

  #ui-hint {
    margin-top: auto;
    font-size: 12px;
    color: #aaa;
    text-align: right;
  }

  #ui-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.7);
    display: none;
    align-items: center;
    justify-content: center;
    color: #eee;
    font-size: 18px;
    text-align: center;
    padding: 20px;
    box-sizing: border-box;
  }

  #ui-overlay-inner {
    max-width: 520px;
  }

  #ui-overlay-text {
    margin-bottom: 16px;
    white-space: pre-wrap;
  }

  #ui-overlay-btn {
    padding: 6px 14px;
    background: #333;
    color: #eee;
    border: 1px solid #777;
    cursor: pointer;
  }

  #ui-overlay-btn:hover {
    background: #444;
  }

  #debug {
    position: absolute;
    top: 4px;
    left: 6px;
    font-size: 11px;
    color: #888;
    pointer-events: none;
  }
</style>
</head>
<body>
<div id="game-root">
  <div id="game-container">
    <canvas id="game-canvas" width="800" height="600"></canvas>

    <div id="ui-dialogue">
      <div id="ui-name"></div>
      <div id="ui-text"></div>
      <div id="ui-hint">SPACE: finish / advance</div>
    </div>

    <div id="ui-overlay">
      <div id="ui-overlay-inner">
        <div id="ui-overlay-text"></div>
        <button id="ui-overlay-btn">Start</button>
      </div>
    </div>

    <div id="debug"></div>
  </div>
</div>

<script>
/* ============================================================
   CANVAS + UI
============================================================ */
const canvas = document.getElementById("game-canvas");
const ctx = canvas.getContext("2d");

const uiDialogue = document.getElementById("ui-dialogue");
const uiName = document.getElementById("ui-name");
const uiText = document.getElementById("ui-text");
const uiOverlay = document.getElementById("ui-overlay");
const uiOverlayText = document.getElementById("ui-overlay-text");
const uiOverlayBtn = document.getElementById("ui-overlay-btn");
const debugEl = document.getElementById("debug");

/* ============================================================
   CHARACTER COLORS
============================================================ */
const CharacterStyles = {
  "???": { name: "???", color: "#e6d0bd" },
  Narrator: { name: "Narrator", color: "#ffffff" },
  Kid: { name: "Kid", color: "#d0d0d0" },
  Father: { name: "Father", color: "#d0d0d0" },
  Doctor: { name: "Doctor", color: "#d0d0d0" },
  Tie: { name: "Tie", color: "#ff7266" },
  Dustworth: { name: "Mr. Dustworth", color: "#c998f2" }
};

function applySpeakerStyle(speaker) {
  const style = CharacterStyles[speaker];
  uiName.style.backgroundColor = style ? style.color : "#444";
  uiName.style.color = "#111";
  uiName.textContent = style ? style.name : speaker;
}

/* ============================================================
   PLACEHOLDER SPRITES
============================================================ */
const PlaceholderSprites = {
  idle: {
    front: [
      "Assets/Placeholder/Place_holder_idle_sprite.front.1.png",
      "Assets/Placeholder/Place_holder_idle_sprite.front.2.png"
    ],
    back: [
      "Assets/Placeholder/Place_holder_idle_sprite.back.1.png",
      "Assets/Placeholder/Place_holder_idle_sprite.back.2.png"
    ],
    left: [
      "Assets/Placeholder/Place_holder_idle_sprite.left.1.png",
      "Assets/Placeholder/Place_holder_idle_sprite.left.2.png"
    ],
    right: [
      "Assets/Placeholder/Place_holder_idle_sprite.right.1.png",
      "Assets/Placeholder/Place_holder_idle_sprite.right.2.png"
    ]
  },
  walk: {
    front: [
      "Assets/Placeholder/Place_holder_walk_sprite.front.1.png",
      "Assets/Placeholder/Place_holder_walk_sprite.front.2.png"
    ],
    back: [
      "Assets/Placeholder/Place_holder_walk_sprite.back.1.png",
      "Assets/Placeholder/Place_holder_walk_sprite.back.2.png"
    ],
    left: [
      "Assets/Placeholder/Place_holder_walk_sprite.left.1.png",
      "Assets/Placeholder/Place_holder_walk_sprite.left.2.png",
      "Assets/Placeholder/Place_holder_walk_sprite.left.3.png"
    ],
    right: [
      "Assets/Placeholder/Place_holder_walk_sprite.right.1.png",
      "Assets/Placeholder/Place_holder_walk_sprite.right.2.png",
      "Assets/Placeholder/Place_holder_walk_sprite.right.3.png"
    ]
  }
};

const PlaceholderImages = {
  idle: { front: [], back: [], left: [], right: [] },
  walk: { front: [], back: [], left: [], right: [] }
};

async function loadPlaceholderSprites() {
  const loadPromises = [];

  for (const state of ["idle", "walk"]) {
    for (const dir of ["front", "back", "left", "right"]) {
      for (const path of PlaceholderSprites[state][dir]) {
        const img = new Image();
        const p = new Promise(resolve => {
          img.onload = resolve;
          img.onerror = resolve;
        });
        img.src = path;

        PlaceholderImages[state][dir].push(img);
        loadPromises.push(p);
      }
    }
  }

  await Promise.all(loadPromises);
}

/* ============================================================
   INPUT
============================================================ */
const keys = {};
window.addEventListener("keydown", e => {
  keys[e.key.toLowerCase()] = true;
  if (e.key === " ") e.preventDefault();
});
window.addEventListener("keyup", e => {
  keys[e.key.toLowerCase()] = false;
});

/* ============================================================
   GAME STATE
============================================================ */
const GameState = {
  mode: "overlay",
  mapId: "room_1",
  player: {
    x: 400,
    y: 360,
    size: 32,
    speed: 1.5,
    animState: "idle",
    animFrame: 0,
    animTimer: 0,
    dir: "front",
    sprites: PlaceholderImages
  }
};

/* ============================================================
   MAPS + NPCs
============================================================ */
const Maps = {};

Maps.room_1 = {
  width: 800,
  height: 600,
  walls: [
    { x: 0, y: 0, w: 800, h: 40 },
    { x: 0, y: 0, w: 40, h: 600 },
    { x: 0, y: 560, w: 800, h: 40 },
    { x: 760, y: 0, w: 40, h: 600 },
    { x: 360, y: 220, w: 80, h: 40 }
  ],
  npcs: [
    {
      id: "tie",
      x: 420,
      y: 280,
      size: 32,
      animState: "idle",
      animFrame: 0,
      animTimer: 0,
      dir: "front",
      sprites: PlaceholderImages
    },
    {
      id: "dustworth",
      x: 200,
      y: 200,
      size: 32,
      animState: "idle",
      animFrame: 0,
      animTimer: 0,
      dir: "front",
      sprites: PlaceholderImages
    }
  ]
};

/* ============================================================
   DIALOGUE SCENE
============================================================ */
const Scenes = {};

Scenes.intro = {
  lines: [
    { speaker: "???", text: "(…huh?\nWhy is everything so… bright?)" },

    { speaker: "Narrator", text:
      "You wake up inside a glass case.\n" +
      "Your joints creak. Your bandages itch.\n" +
      "You are very, very dead.\n" +
      "And somehow not."
    },

    { speaker: "Kid", text: "Dad, look! It’s a mummy!" },

    { speaker: "Narrator", text:
      "You look at the kid talking ever so loudly and eagerly.\n" +
      "The kid then freezes up, shocked and starts…\n\nCrying?"
    },

    { speaker: "Kid", text: "WAHHHHHH I-I-I-I-IT MOVED!!" },

    { speaker: "???", text: "*...*" },

    { speaker: "Narrator", text: "The dad steps closer to the kid and drags them off." },

    { speaker: "Father", text:
      "Shh shh shhh, stop crying… haha… it’s okay! See?\n" +
      "It’s not moving… right Mr. Dustworth?"
    },

    { speaker: "Dustworth", text:
      "Oh? Kids these days surely have a bright imagination."
    },

    { speaker: "Narrator", text:
      "Mr. Dustworth walks over to look at your case.\n" +
      "He looks a bit surprised by you, being an artifact, blinking."
    },

    { speaker: "Dustworth", text: "It’s truly nothing… hehe." },

    { speaker: "Narrator", text:
      "Mr. Dustworth assures the father as he dials a number on his phone.\n" +
      "You close your eyes, a bit too tired yet too energetic."
    },

    { speaker: "Doctor", text:
      "Ah, I see. You're finally awake.\n" +
      "So you're unable to do several things like being in contact with water,\n" +
      "sleep for long periods of time, sleep for short periods of time,\n" +
      "and you’ll need oil to keep your joints moving—"
    },

    { speaker: "Tie", text:
      "*scoot scoot*\n" +
      "Ugh, it’s been a week and this f*cker still hasn’t fed me…"
    },

    { speaker: "Narrator", text:
      "An annoyed voice complains.\n" +
      "It stops scooting."
    }
  ],
  onComplete: () => {
    GameState.mode = "map";
    hideDialogue();
  }
};

/* ============================================================
   DIALOGUE SYSTEM
============================================================ */
let currentScene = null;
let currentLine = 0;
let typing = false;
let typingIndex = 0;
let typingSpeed = 20;

function showDialogue(scene) {
  currentScene = scene;
  currentLine = 0;
  uiDialogue.style.display = "flex";
  uiDialogue.classList.add("show");
  showLine();
}

function hideDialogue() {
  uiDialogue.style.display = "none";
  uiDialogue.classList.remove("show");
}

function showLine() {
  const line = currentScene.lines[currentLine];
  applySpeakerStyle(line.speaker);
  uiText.textContent = "";
  typing = true;
  typingIndex = 0;
  typeText(line.text);
}

function typeText(text) {
  if (!typing) return;
  uiText.textContent = text.slice(0, typingIndex);
  typingIndex++;

  if (typingIndex <= text.length) {
    setTimeout(() => typeText(text), typingSpeed);
  } else {
    typing = false;
  }
}

function advanceDialogue() {
  if (typing) {
    typing = false;
    uiText.textContent = currentScene.lines[currentLine].text;
    return;
  }

  currentLine++;
  if (currentLine >= currentScene.lines.length) {
    currentScene.onComplete();
    return;
  }

  showLine();
}

/* ============================================================
   COLLISION
============================================================ */
function collides(x, y, w, h, walls) {
  for (const wall of walls) {
    if (
      x < wall.x + wall.w &&
      x + w > wall.x &&
      y < wall.y + wall.h &&
      y + h > wall.y
    ) {
      return true;
    }
  }
  return false;
}

function collidesWithNPC(x, y, size, npcs) {
  for (const npc of npcs) {
    const half = size / 2;
    const nHalf = npc.size / 2;

    if (
      x + half > npc.x - nHalf &&
      x - half < npc.x + nHalf &&
      y + half > npc.y - nHalf &&
      y - half < npc.y + nHalf
    ) {
      return true;
    }
  }
  return false;
}

/* ============================================================
   MOVEMENT + ANIMATION
============================================================ */
function movePlayer(dt) {
  const p = GameState.player;
  const map = Maps[GameState.mapId];

  const prevDir = p.dir;
  const prevState = p.animState;

  let dx = 0;
  let dy = 0;

  if (keys["w"] || keys["arrowup"]) dy -= 1;
  if (keys["s"] || keys["arrowdown"]) dy += 1;
  if (keys["a"] || keys["arrowleft"]) dx -= 1;
  if (keys["d"] || keys["arrowright"]) dx += 1;

  if (dx !== 0 || dy !== 0) {
    const len = Math.hypot(dx, dy);
    dx = (dx / len) * p.speed;
    dy = (dy / len) * p.speed;
  }

  if (dy < 0) p.dir = "back";
  else if (dy > 0) p.dir = "front";
  if (dx < 0) p.dir = "left";
  else if (dx > 0) p.dir = "right";

  p.animState = (dx !== 0 || dy !== 0) ? "walk" : "idle";

  if (p.dir !== prevDir || p.animState !== prevState) {
    p.animFrame = 0;
    p.animTimer = 0;
  }

  const npcs = map.npcs;

  const newX = p.x + dx;
  if (
    !collides(newX - p.size/2, p.y - p.size/2, p.size, p.size, map.walls) &&
    !collidesWithNPC(newX, p.y, p.size, npcs)
  ) {
    p.x = newX;
  }

  const newY = p.y + dy;
  if (
    !collides(p.x - p.size/2, newY - p.size/2, p.size, p.size, map.walls) &&
    !collidesWithNPC(p.x, newY, p.size, npcs)
  ) {
    p.y = newY;
  }

  updateCharacterAnimation(p, dt);
}

function updateCharacterAnimation(char, dt) {
  char.animTimer += dt;
  const frames = char.sprites[char.animState][char.dir];

  if (char.animTimer >= 200) {
    char.animTimer = 0;
    char.animFrame = (char.animFrame + 1) % frames.length;
  }
}

function drawCharacter(char) {
  const img = char.sprites[char.animState][char.dir][char.animFrame];
  if (!img || !img.complete) return;

  const half = char.size / 2;
  ctx.drawImage(
    img,
    Math.round(char.x - half),
    Math.round(char.y - half),
    char.size,
    char.size
  );
}

/* ============================================================
   INTERACTION PROMPT
============================================================ */
let showInteractPrompt = false;
let interactX = 0;
let interactY = 0;

function updateInteractPrompt() {
  const p = GameState.player;
  const npcs = Maps[GameState.mapId].npcs;

  showInteractPrompt = false;

  for (const npc of npcs) {
    const dist = Math.hypot(p.x - npc.x, p.y - npc.y);
    if (dist < 50) {
      showInteractPrompt = true;
      interactX = npc.x;
      interactY = npc.y;
      return;
    }
  }
}

/* ============================================================
   RENDERING
============================================================ */
function renderMap() {
  const map = Maps[GameState.mapId];

  ctx.fillStyle = "#222";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "#444";
  for (const wall of map.walls) {
    ctx.fillRect(wall.x, wall.y, wall.w, wall.h);
  }

  for (const npc of map.npcs) {
    updateCharacterAnimation(npc, 16);
    drawCharacter(npc);
  }

  drawCharacter(GameState.player);

  if (showInteractPrompt) {
    ctx.fillStyle = "white";
    ctx.font = "16px sans-serif";
    ctx.fillText("E to interact", interactX - 40, interactY - 40);
  }
}

/* ============================================================
   OVERLAY
============================================================ */
function showOverlay(text) {
  uiOverlayText.textContent = text;
  uiOverlay.style.display = "flex";
}

function hideOverlay() {
  uiOverlay.style.display = "none";
}

/* ============================================================
   MAIN LOOP
============================================================ */
let lastTime = performance.now();

function loop(now) {
  const dt = now - lastTime;
  lastTime = now;

  if (GameState.mode === "map") {
    movePlayer(dt);
    updateInteractPrompt();
    renderMap();
  } else if (GameState.mode === "dialogue") {
    renderMap();
  }

  debugEl.textContent =
    `mode=${GameState.mode} ` +
    `x=${GameState.player.x.toFixed(1)} ` +
    `y=${GameState.player.y.toFixed(1)} ` +
    `dir=${GameState.player.dir} ` +
    `state=${GameState.player.animState}`;

  requestAnimationFrame(loop);
}

/* ============================================================
   INPUT: DIALOGUE + INTERACT
============================================================ */
window.addEventListener("keydown", e => {
  if (e.key === " ") {
    if (GameState.mode === "dialogue") {
      advanceDialogue();
    }
  }
  if (e.key.toLowerCase() === "e") {
    if (GameState.mode === "map") {
      // later: check which NPC is near and trigger dialogue
      // for now, just log
      console.log("Interact pressed");
    }
  }
});

/* ============================================================
   STARTUP
============================================================ */
uiOverlayBtn.addEventListener("click", () => {
  hideOverlay();
  GameState.mode = "dialogue";
  showDialogue(Scenes.intro);
});

async function startGame() {
  await loadPlaceholderSprites();

  showOverlay(
    "The Time I Woke Up Inside a Museum and Now My Boss Is Making Me Fetch Artifacts\n\n" +
    "WASD / Arrows: Move\n" +
    "E: Interact\n" +
    "SPACE: Finish / Advance Dialogue"
  );

  lastTime = performance.now();
  requestAnimationFrame(loop);
}

startGame();
</script>
</body>
</html>
